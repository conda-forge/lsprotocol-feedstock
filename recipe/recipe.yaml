# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: 2024.0.0b1

package:
  name: lsprotocol
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/lsprotocol/lsprotocol-${{ version }}.tar.gz
    sha256: d3667fb70894d361aa6c495c5c8a1b2e6a44be65ff84c21a9cbb67ebfb4830fd
    target_directory: dist
  - url: https://github.com/microsoft/lsprotocol/archive/refs/tags/${{ version }}.tar.gz
    sha256: 0697ef66ca1b547cadb4c27080d6095c2e403b9aeb05401de383126a70720a56
    target_directory: src

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps --disable-pip-version-check

requirements:
  host:
    - flit-core >=3.2,<4
    - pip
    - python ${{ python_min }}.*
  run:
    - attrs >=21.3.0
    - cattrs !=23.2.1
    - python >=${{ python_min }}

tests:
  - python:
      imports: lsprotocol
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.13.*
  - files:
      source:
        - src/conftest.py
        - src/tests
        - src/generator
    requirements:
      run:
        - importlib_resources
        - jsonschema
        - pyhamcrest
        - pytest-cov
        - python ${{ python_min }}.*
    script:
      - cd src
      - coverage run --source=lsprotocol --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=88

about:
  summary: Python implementation of the Language Server Protocol.
  license: MIT
  license_file: dist/LICENSE
  homepage: https://pypi.org/project/lsprotocol
  repository: https://github.com/microsoft/lsprotocol

extra:
  recipe-maintainers:
    - bollwyvl
